<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Soft warm white background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F4FA"/>
    </linearGradient>
    <!-- Blue accent gradient for infinity -->
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3A5FA0"/>
      <stop offset="100%" style="stop-color:#5B8DEF"/>
    </linearGradient>
    <!-- Subtle inner shadow filter -->
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#8AAAD0" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- White background (macOS clips to squircle) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Very subtle background watermark ring -->
  <circle cx="512" cy="460" r="290" fill="none" stroke="#5B8DEF" stroke-width="1.5" opacity="0.08"/>
  <circle cx="512" cy="460" r="230" fill="none" stroke="#5B8DEF" stroke-width="1" opacity="0.05"/>

  <!-- Infinity symbol — centered, larger, with drop shadow -->
  <g filter="url(#soft)">
    <!-- Left loop -->
    <path d="M 512 460
             C 512 340, 412 252, 322 252
             C 232 252, 164 324, 164 412
             C 164 500, 232 572, 322 572
             C 370 572, 416 542, 462 498
             L 512 446"
          fill="none" stroke="url(#ink)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right loop -->
    <path d="M 512 446
             L 562 498
             C 608 542, 654 572, 702 572
             C 792 572, 860 500, 860 412
             C 860 324, 792 252, 702 252
             C 612 252, 512 340, 512 460"
          fill="none" stroke="url(#ink)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Calendar dots inside right loop — perfectly centered in loop -->
  <!-- 3x3 grid, spacing 52px -->
  <!-- Row 1 -->
  <circle cx="666" cy="360" r="13" fill="#4A6FA5" opacity="0.45"/>
  <circle cx="718" cy="360" r="13" fill="#4A6FA5" opacity="0.45"/>
  <circle cx="770" cy="360" r="13" fill="#4A6FA5" opacity="0.45"/>
  <!-- Row 2 -->
  <circle cx="666" cy="412" r="13" fill="#4A6FA5" opacity="0.70"/>
  <circle cx="718" cy="412" r="15" fill="#5B8DEF" opacity="1.0"/>
  <circle cx="770" cy="412" r="13" fill="#4A6FA5" opacity="0.70"/>
  <!-- Row 3 -->
  <circle cx="666" cy="464" r="13" fill="#4A6FA5" opacity="0.30"/>
  <circle cx="718" cy="464" r="13" fill="#4A6FA5" opacity="0.30"/>
  <circle cx="770" cy="464" r="13" fill="#4A6FA5" opacity="0.30"/>

  <!-- Divider line -->
  <line x1="180" y1="654" x2="844" y2="654" stroke="#D0DAEB" stroke-width="1.5" opacity="0.7"/>

  <!-- App name — refined spacing -->
  <text x="512" y="740"
        text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="56"
        font-weight="300"
        letter-spacing="14"
        fill="#2B3A5C"
        opacity="0.85">FOREVER DIARY</text>
</svg>
