<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F9FA"/>
      <stop offset="100%" style="stop-color:#EEF1F5"/>
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A6FA5"/>
      <stop offset="100%" style="stop-color:#5B8DEF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Infinity symbol - two overlapping loops -->
  <!-- Left loop -->
  <path d="M 512 512
           C 512 400, 420 320, 340 320
           C 260 320, 200 380, 200 460
           C 200 540, 260 600, 340 600
           C 380 600, 420 570, 460 530
           L 512 480"
        fill="none" stroke="url(#stroke)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right loop with calendar grid -->
  <path d="M 512 480
           L 564 530
           C 604 570, 644 600, 684 600
           C 764 600, 824 540, 824 460
           C 824 380, 764 320, 684 320
           C 604 320, 512 400, 512 512"
        fill="none" stroke="url(#stroke)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Calendar grid dots inside right loop -->
  <!-- Row 1 -->
  <circle cx="648" cy="420" r="12" fill="#4A6FA5" opacity="0.7"/>
  <circle cx="688" cy="420" r="12" fill="#4A6FA5" opacity="0.7"/>
  <circle cx="728" cy="420" r="12" fill="#4A6FA5" opacity="0.7"/>
  <!-- Row 2 -->
  <circle cx="648" cy="460" r="12" fill="#4A6FA5" opacity="0.9"/>
  <circle cx="688" cy="460" r="12" fill="#5B8DEF" opacity="1.0"/>
  <circle cx="728" cy="460" r="12" fill="#4A6FA5" opacity="0.7"/>
  <!-- Row 3 -->
  <circle cx="648" cy="500" r="12" fill="#4A6FA5" opacity="0.5"/>
  <circle cx="688" cy="500" r="12" fill="#4A6FA5" opacity="0.5"/>
  <circle cx="728" cy="500" r="12" fill="#4A6FA5" opacity="0.7"/>

  <!-- Subtle text below -->
  <text x="512" y="720" text-anchor="middle" font-family="-apple-system, SF Pro Rounded, Helvetica Neue" font-size="64" font-weight="600" fill="#2B2D42" letter-spacing="4">
    FOREVER DIARY
  </text>
</svg>
