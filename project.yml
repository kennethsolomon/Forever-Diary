name: ForeverDiary
options:
  bundleIdPrefix: com.foreverdiary
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_FILE: ForeverDiary/Info.plist

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"

targets:
  ForeverDiary:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - package: WhisperKit
    sources:
      - path: ForeverDiary
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foreverdiary.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Forever Diary"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Forever Diary uses your location to tag diary entries with where you were."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Forever Diary lets you attach photos to your diary entries."
        INFOPLIST_KEY_NSCameraUsageDescription: "Forever Diary lets you take photos to attach to your diary entries."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Forever Diary uses speech recognition to transcribe your voice into diary entries."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Forever Diary uses the microphone to record your voice for diary dictation."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: accentSlate
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: ForeverDiary/ForeverDiary.entitlements
    entitlements:
      path: ForeverDiary/ForeverDiary.entitlements
      properties: {}

  ForeverDiaryMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    dependencies:
      - sdk: PhotosUI.framework
        embed: false
      - sdk: Network.framework
        embed: false
      - package: WhisperKit
    sources:
      - path: ForeverDiaryMac
        excludes:
          - "**/.DS_Store"
      - path: ForeverDiary/Models
        excludes:
          - "**/.DS_Store"
      - path: ForeverDiary/Services
        excludes:
          - "**/.DS_Store"
      - path: ForeverDiary/Views/Speech
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foreverdiary.mac
        INFOPLIST_KEY_CFBundleDisplayName: "Forever Diary"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: ForeverDiaryMac/ForeverDiaryMac.entitlements
    entitlements:
      path: ForeverDiaryMac/ForeverDiaryMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true

  ForeverDiaryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForeverDiaryTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: ForeverDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foreverdiary.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ForeverDiary.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ForeverDiary"
        BUNDLE_LOADER: "$(TEST_HOST)"
