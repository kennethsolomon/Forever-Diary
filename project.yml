name: ForeverDiary
options:
  bundleIdPrefix: com.foreverdiary
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: true
    INFOPLIST_FILE: ForeverDiary/Info.plist

targets:
  ForeverDiary:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForeverDiary
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foreverdiary.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "Forever Diary"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Forever Diary uses your location to tag diary entries with where you were."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Forever Diary lets you attach photos to your diary entries."
        INFOPLIST_KEY_NSCameraUsageDescription: "Forever Diary lets you take photos to attach to your diary entries."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: accentSlate
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_ENTITLEMENTS: ForeverDiary/ForeverDiary.entitlements
    entitlements:
      path: ForeverDiary/ForeverDiary.entitlements
      properties: {}

  ForeverDiaryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForeverDiaryTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: ForeverDiary
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foreverdiary.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ForeverDiary.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ForeverDiary"
        BUNDLE_LOADER: "$(TEST_HOST)"
